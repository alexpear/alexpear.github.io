creature:
    human:
        weight: 80
        # LATER fill out

    # TODO is a tank a creature or a item?

trait:
    stealthy:
        stealth: 10

item:
    knife:
        weight: 1
        cost: 1
        attack:
            range: 0
            damage: 5
            type: blade
        slots:
            core: 1

    gun:
        weight: 1
        cost: 1
        attack:
            range: 10
            damage: 10
            shotspersec: 1
            stealth: -10
            type: pierce
        slots:
            core: 1
            barrel: 1
            chamber: 2

    # Item parts
    extendedBarrel:
        weight: 1
        cost: 1
        asmod:
            attachto: gun
            slot: barrel
            overwrite:
                name: rifle
                hands: 2
            add:
                range: 20

        # NOTE Carrying a extended barrel by itself with no gun should not increase your range. Items can have these effects on range:
        # As a top level item, it increases the group's range. Eg a tank robot with a upgrade item.
        # As a top level item, its ability has X range
        # As a mod, it increases its parent's range

    silencer:
        weight: 1
        cost: 1
        asmod:
            attachto: gun
            slot: barrel
            prefix: 'stealth '
            add:
                stealth: 5
                damage: -1

    heavyAmmo:
        weight: 5
        cost: 1
        asmod:
            attachto: gun
            slot: core
            prefix: 'heavy '
            add:
                damage: 10

    autofireModule:
        weight: 5
        cost: 1
        asmod:
            attachto: gun
            slot: chamber
            attachcopies: 2 # You can attach 2 copies of this. Only 1 prefix is applied.
            prefix: auto
            add:
                shotspersec: 10

    battery:
        weight: 3
        cost: 1
        asmod:
            attachto: any
            slot: core
            prefix: electro
            add:
                damagetype: electric
                damage: 5

    thermalCoil:
        weight: 1
        cost: 2
        asmod:
            attachto: any
            slot: core
            prefix: pyro
            add:
                damagetype: fire
                damage: 5

    chronanchor:
        weight: 1
        cost: 5
        asmod:
            attachto: any
            slot: core
            prefix: chrono
            add:
                effect: slowtime 1

    dataIkon:
        weight: 1
        cost: 5
        asmod:
            attachto: any
            slot: core
            prefix: info
            add:
                damagetype: data
                damage: 1

    hoverAmmo:
        weight: 1
        cost: 10
        asmod:
            attachto: any
            slot: core
            prefix: hover
            add:
                damagetype: antigrav
                damage: 1

    laserCrystal:
        weight: 1
        cost: 2
        asmod:
            attachto: any
            slot: core
            prefix: las # prefix can be a child of asmod or of add.
            overwrite:
                damagetype: laser
                # LATER should we distinguish between fire, heat, and/or laser damage? Or are they different delivery methods for heat damage?

    technovirusPhial:
        weight: 1
        cost: 10
        asmod:
            attachto: any
            slot: core
            add:
                damagetype: nano
                damage: 1
            prefix: nano

    acidPhial:
        weight: 1
        cost: 2
        asmod:
            attachto: any
            slot: core
            add:
                damagetype: acid
                damage: 1
            prefix: acid

    adhesiveCapsule:
        weight: 1
        cost: 2
        asmod:
            attachto: any
            slot: core
            add:
                effect: adhesive 1
            prefix: sticky

    sonicIntoner:
        weight: 1
        cost: 2
        asmod:
            attachto: any
            slot: core
            overwrite:
                damagetype: sonic
            prefix: thunder

    stingrayCoil:
        weight: 1
        cost: 2
        asmod:
            attachto: any
            slot: core
            overwrite:
                damagetype: laser
            prefix: sting
