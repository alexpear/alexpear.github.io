# Weapons
knife:
    weight: 1
    cost: 1
    action: attack
    range: 0
    damage: 5
    moddable: true

gun:
    weight: 1
    cost: 1
    action: attack
    range: 10
    damage: 10
    shotspersec: 1
    stealth: -1
    moddable: true

# Item parts
extendedBarrel:
    attachto: gun
    rename: rifle
    weight: 1
    cost: 1
    range: 20
    hands: 2 # NOTE: This is confusing because it sets the hands number to 2, but range above is a relative modifier +20.

silencer:
    attachto: gun
    prefix: 'stealth '
    weight: 1
    cost: 1
    stealth: 5
    damage: -1

heavyAmmo:
    attachto: gun
    prefix: 'heavy '
    weight: 5
    cost: 1
    damage: 10

autofireModule:
    attachto: gun
    prefix: auto
    weight: 5
    cost: 1
    shotspersec: 10
    attachcopies: 2 # You can attach 2 copies of this. Only 1 prefix is applied.

# Obstacle - There should be some sort of slot limit where you can't have multiple damage type mods.

