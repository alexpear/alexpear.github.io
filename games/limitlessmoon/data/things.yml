## Many files, weapons.yml, gear.yml, traits.yml, creatures.yml

## Top-level YAML object keys in here. creature:, trait:, item:, subset weapon: etc
### appealing

# Weapons
knife:
    weight: 1
    cost: 1
    attack:
        range: 0
        damage: 5
        type: blade
    moddable: true

gun:
    weight: 1
    cost: 1
    attack:
        range: 10
        damage: 10
        shotspersec: 1
        stealth: -10
        type: pierce
    moddable: true

# Item parts
extendedBarrel:
    weight: 1
    cost: 1
    asMod:
        attachto: gun
        rename: rifle
        range: 20
        hands: 2 # NOTE: This is a little confusing because it sets the hands number to 2, but range above is a relative modifier +20.

    # NOTE Carrying a extended barrel by itself with no gun should not increase your range. Items can have these effects on range: 
    # As a top level item, it increases the group's range. Eg a tank robot with a upgrade item.
    # As a top level item, its ability has X range
    # As a mod, it increases its parent's range

silencer:
    weight: 1
    cost: 1
    asMod:
        attachto: gun
        prefix: 'stealth '
        stealth: 5
        damage: -1

heavyAmmo:
    weight: 5
    cost: 1
    asMod:
        attachto: gun
        prefix: 'heavy '
        damage: 10

autofireModule:
    weight: 5
    cost: 1
    asMod:
        attachto: gun
        prefix: auto
        shotspersec: 10
        attachcopies: 2 # You can attach 2 copies of this. Only 1 prefix is applied.

# Obstacle - There should be some sort of slot limit where you can't have multiple damage type mods. TODO

